name: CD — Deploy to Live

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build, Test & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Oracle Instant Client
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q libaio1t64 unzip || sudo apt-get install -y -q libaio1 unzip
          mkdir -p /opt/oracle
          curl -sL "https://download.oracle.com/otn_software/linux/instantclient/1919000/instantclient-basic-linux.x64-19.19.0.0.0dbru.zip" -o /tmp/ic.zip
          unzip -q /tmp/ic.zip -d /opt/oracle/
          echo "/opt/oracle/instantclient_19_19" | sudo tee /etc/ld.so.conf.d/oracle-instantclient.conf
          sudo ldconfig
          rm /tmp/ic.zip

      - name: Enable pnpm via corepack
        run: corepack enable && corepack prepare pnpm@9 --activate

      - name: Install dependencies
        run: pnpm install

      - name: TypeScript check
        run: npx tsc --noEmit --skipLibCheck

      - name: Build
        run: pnpm run build

      - name: Run tests
        run: pnpm test

      # ── Deploy to Oracle Live Server ─────────────────────
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.LIVE_HOST }}
          username: ${{ secrets.LIVE_USER }}
          key: ${{ secrets.LIVE_SSH_KEY }}
          port: ${{ secrets.LIVE_PORT || 22 }}
          script: |
            set -e
            echo "🚀 Deploying CodeAtlas to live..."

            # 1. Pull latest code
            cd /var/www/codeatlas-ai
            git pull origin main

            # 2. Fix permissions (node_modules may be owned by root from previous deploys)
            sudo chown -R "$(whoami):$(whoami)" .

            # 3. Ensure pnpm is available
            export PATH="$HOME/.npm-global/bin:$PATH"
            which pnpm >/dev/null 2>&1 || npm install -g pnpm

            # 4. Install dependencies
            pnpm install

            # 5. Build
            pnpm run build

            # 6. Run DB auto-migration (idempotent — auto-fixes vector dim etc.)
            echo "📦 Running DB migration..."
            npm run db-init

            # 7. Restart service
            echo "🔄 Restarting service..."
            pm2 restart codeatlas-enterprise || pm2 start dist/index.js --name codeatlas-enterprise

            # 8. Health check
            sleep 3
            curl -s --max-time 5 -o /dev/null -w "%{http_code}" http://localhost:8080/health || echo "⚠️ Health check failed"

            echo "✅ Deploy complete!"
