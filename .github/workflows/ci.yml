name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies (Root)
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit --skipLibCheck

      - name: Build Main Server
        run: npm run build

      - name: Install dependencies (Dashboard)
        run: |
          cd dashboard
          npm ci

      - name: Build Dashboard
        run: |
          cd dashboard
          npm run build

      - name: Run analyzer tests
        run: npm test

  package:
    name: Package VSIX
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build & Package VSIX
        run: npm run package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: codeatlas-vsix
          path: '*.vsix'
          retention-days: 30
