name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies (Root)
        run: pnpm install

      - name: TypeScript type check
        run: npx tsc --noEmit --skipLibCheck

      - name: Build Main Server
        run: pnpm run build

      - name: Build Dashboard
        run: |
          cd dashboard
          pnpm run build

      - name: Run analyzer tests
        working-directory: ./
        run: pnpm test

  review:
    name: Command Code PR Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Code Review
        env:
          COMMAND_CODE_API_KEY: ${{ secrets.COMMANDCODE_API_KEY }}
          COMMANDCODE_API_KEY: ${{ secrets.COMMANDCODE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx -y command-code@latest --skip-onboarding --yolo -p "/review"
