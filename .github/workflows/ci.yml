name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Oracle Instant Client
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q libaio1t64 unzip || sudo apt-get install -y -q libaio1 unzip
          mkdir -p /opt/oracle
          curl -sL "https://download.oracle.com/otn_software/linux/instantclient/1919000/instantclient-basic-linux.x64-19.19.0.0.0dbru.zip" -o /tmp/ic.zip
          unzip -q /tmp/ic.zip -d /opt/oracle/
          echo "/opt/oracle/instantclient_19_19" | sudo tee /etc/ld.so.conf.d/oracle-instantclient.conf
          sudo ldconfig
          rm /tmp/ic.zip

      - name: Enable pnpm via corepack
        run: corepack enable && corepack prepare pnpm@9 --activate

      - name: Install dependencies (Root)
        run: pnpm install

      - name: TypeScript type check
        run: npx tsc --noEmit --skipLibCheck

      - name: Build Main Server
        run: pnpm run build

      - name: Build Dashboard
        run: |
          cd dashboard
          pnpm run build

      - name: Run analyzer tests
        working-directory: ./
        run: pnpm test
