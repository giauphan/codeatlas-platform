name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm via corepack
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Install dependencies (Root)
        run: pnpm install

      - name: TypeScript type check
        run: npx tsc --noEmit --skipLibCheck

      - name: Build Main Server
        run: pnpm run build

      - name: Build Dashboard
        run: |
          cd dashboard
          pnpm run build

      - name: Run analyzer tests
        working-directory: ./
        run: pnpm test

  review:
    name: Command Code PR Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Code Review
        env:
          COMMAND_CODE_API_KEY: ${{ secrets.COMMAND_CODE_API_KEY || secrets.COMMANDCODE_API_KEY }}
          COMMANDCODE_API_KEY: ${{ secrets.COMMAND_CODE_API_KEY || secrets.COMMANDCODE_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          npx -y command-code@latest --skip-onboarding --yolo -m deepseek/deepseek-v4-pro --max-turns 30 -p "/review" > review_report.md 2>&1 || echo "::warning::Command Code review exited with code $?"
          cat review_report.md

      - name: Post Comment to PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            if (fs.existsSync('review_report.md')) {
              const report = fs.readFileSync('review_report.md', 'utf8').trim();
              if (report) {
                const prUser = context.payload.pull_request?.user?.login || context.actor;
                const commentBody = `cc @${prUser}\n\n${report}`;
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: commentBody
                });
                console.log(`Posted review comment for @${prUser}`);
              }
            }
